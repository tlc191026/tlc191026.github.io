site_name: 桐&辰
site_url: https://tlc191026.github.io

theme:
  name: material
  palette:
    # 日间：薄玫为主色，蜜黄为强调色（具体色值由 extra.css 的 --love-* 变量接管）
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: 切换到夜读模式
    # 夜间：暖灰底 + 薄玫提亮
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: 切换到日间模式
  features:
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - navigation.expand
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
  language: zh
  font:
    text: 'Noto Serif SC'
    code: 'JetBrains Mono'

# 自定义CSS和JS
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/auth-gate.js
  - javascripts/extra.js

# Markdown扩展
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search

# 开发辅助 hooks（仅 mkdocs serve 时改写远程 raw URL 为本地路径）
hooks:
  - mkdocs_hooks.py

# 导航顺序
# 注：仅有标题、尚未撰写内容的占位章节（如「第一年」「第三年」）暂不列出，
# 内容写好后再加入对应条目即可。
nav:
  - 首页: index.md
  - 我们的小站:
      - 三周年快乐~: 我们的小站/home.md
      - 建立初衷: 我们的小站/构建的过程/original intention.md
  - 我们的爱情:
      - 一些想对宝宝说的话: 我们的爱情/something want to say.md
      - 回忆相册:
          - 在我们坠入爱河之前: 我们的爱情/回忆相册/0-before_we_falling_love.md
          - 我们在一起的第二年: 我们的爱情/回忆相册/2_second.md
          - 我们在一起的第四年: 我们的爱情/回忆相册/4_fourth.md
          - 和你一起走过的路: 我们的爱情/回忆相册/99-travel.md
